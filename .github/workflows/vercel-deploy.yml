# Backup deploy when Vercel Git integration does not run.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID — see docs/VERCEL_DEPLOYMENT.md

name: Vercel Deploy

on:
  push:
    branches:
      - main
      - 'cursor/**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping deploy. See docs/VERCEL_DEPLOYMENT.md"
            exit 0
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::VERCEL_ORG_ID or VERCEL_PROJECT_ID not set — skipping deploy."
            exit 0
          fi

      - name: Checkout
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install -g vercel@39

      - name: Deploy to Vercel (remote build)
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel deploy --yes --token="${{ secrets.VERCEL_TOKEN }}"
          fi
