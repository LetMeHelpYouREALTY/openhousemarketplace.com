# Deploy on every push when Vercel Git integration does not run (or as a reliable backup).
# Required GitHub repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# See docs/VERCEL_DEPLOYMENT.md

name: Vercel Deploy

on:
  push:
    branches:
      - main
      - 'cursor/**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
          fi

      - name: Build
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel build --token="${{ secrets.VERCEL_TOKEN }}"
          fi

      - name: Deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
          fi

  secrets-missing:
    if: ${{ secrets.VERCEL_TOKEN == '' || secrets.VERCEL_ORG_ID == '' || secrets.VERCEL_PROJECT_ID == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Warn
        run: |
          echo "::warning::Vercel deploy skipped — add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID as GitHub Actions secrets."
          echo "See docs/VERCEL_DEPLOYMENT.md"
